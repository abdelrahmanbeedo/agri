<!DOCTYPE html>
<html>
<head>



    <style>
  body {
    font-family: Arial, sans-serif;
    background-color: #f4f4f4;
    padding: 20px;
    color: #333;
  }

  h1 {
    color: #2c3e50;
    margin-bottom: 10px;
  }

  h2 {
    color: #34495e;
    margin-top: 30px;
  }

  form {
    background-color: #fff;
    padding: 15px;
    border-radius: 8px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    max-width: 400px;
    margin-bottom: 20px;
  }

  input, select {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    margin-bottom: 12px;
    border: 1px solid #ccc;
    border-radius: 4px;
  }

  button {
    background-color: #27ae60;
    color: white;
    padding: 10px 15px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
  }

  button:hover {
    background-color: #219150;
  }

  #output {
    background-color: #ecf0f1;
    padding: 10px;
    border-radius: 4px;
    white-space: pre-wrap;
    max-width: 600px;
  }
</style>

  <title>Agri Auth Test</title>
</head>
<body>
  <h1>Test Backend API</h1>

  <h2>Register</h2>
  <form id="registerForm">
    <input type="text" id="regName" placeholder="Name" required><br>
    <input type="email" id="regEmail" placeholder="Email" required><br>
    <input type="password" id="regPass" placeholder="Password" required><br>
    <select id="regRole">
      <option value="farmer">Farmer</option>
      <option value="trader">Trader</option>
    </select><br><br>
    <button type="submit">Register</button>
  </form>

  <h2>Login</h2>
  <form id="loginForm">
    <input type="email" id="logEmail" placeholder="Email" required><br>
    <input type="password" id="logPass" placeholder="Password" required><br><br>
    <button type="submit">Login</button>
  </form>

  <h2>Get Current User</h2>
  <button id="meBtn">Get /api/me</button>

  <pre id="output"></pre>

  <script>
    let token = "";

    function show(data) {
      document.getElementById("output").textContent = JSON.stringify(data, null, 2);
    }

    document.getElementById("registerForm").onsubmit = async (e) => {
      e.preventDefault();
      const res = await fetch("http://localhost:5000/api/auth/register", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          name: document.getElementById("regName").value,
          email: document.getElementById("regEmail").value,
          password: document.getElementById("regPass").value,
          role: document.getElementById("regRole").value
        })
      });
      show(await res.json());
    };

    document.getElementById("loginForm").onsubmit = async (e) => {
      e.preventDefault();
      const res = await fetch("http://localhost:5000/api/auth/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          email: document.getElementById("logEmail").value,
          password: document.getElementById("logPass").value
        })
      });

      const data = await res.json();
      show(data);

      if (data.token) token = data.token;
    };

    document.getElementById("meBtn").onclick = async () => {
      const res = await fetch("http://localhost:5000/api/me", {
        headers: {
          "Authorization": "Bearer " + token
        }
      });
      show(await res.json());
    };
  </script>
</body>
</html>
